<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFTI 发疯人格测试</title>
  <meta name="description" content="用科学测量你的不科学。FFTI 发疯人格类型测试。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>" />
  <script type="module" crossorigin src="./assets/index-RuAqzunR.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-B2QuGESA.css">
</head>
<body>
  <div id="app">
    <section id="page-intro" class="page active">
      <div class="intro-stamp">🧪</div>
      <h1 class="intro-title">
        <span class="intro-title-line1">FFTI</span>
        <span class="intro-title-line2">发疯人格类型指标</span>
      </h1>
      <div class="intro-divider"></div>
      <p class="intro-subtitle">用科学测量你的不科学。</p>
      <p class="intro-summary" id="intro-summary"></p>
      <div class="intro-models" id="intro-models" aria-label="测试维度概览"></div>
      <button id="btn-start" class="btn btn-primary">
        <span>开始测试</span>
        <span class="btn-arrow">→</span>
      </button>
      <p class="intro-footnote">结果仅供娱乐，但会尽量准确地描述你的大学精神状态。</p>
    </section>

    <section id="page-quiz" class="page">
      <div class="quiz-card">
        <div class="quiz-topbar">
          <button type="button" class="quiz-back-link" id="btn-quiz-home">← 主页</button>
          <span class="quiz-qnum" id="question-number"></span>
          <span class="quiz-progress" id="progress-text">已答 0 / 33</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="quiz-body" aria-live="polite">
          <p class="question-text" id="question-text"></p>
        </div>
        <div class="options" id="options"></div>
        <div class="quiz-nav" id="quiz-nav"></div>
      </div>
    </section>

    <section id="page-result" class="page">
      <div class="result-card" aria-live="polite">
        <div class="result-banner">
          <div class="result-avatar-wrap">
            <img class="result-avatar" id="result-avatar" alt="" />
          </div>
          <div class="result-kicker" id="result-kicker"></div>
          <div class="result-code" id="result-code"></div>
          <div class="result-name" id="result-name"></div>
        </div>

        <div class="result-meta-row">
          <span class="result-badge" id="result-badge"></span>
          <span class="result-level" id="result-level"></span>
        </div>

        <div class="result-quote" id="result-intro"></div>
        <div class="result-desc" id="result-desc"></div>

        <div class="result-section">
          <h3 class="section-title"><span>十五维度评分</span></h3>
          <div class="radar-wrap">
            <canvas id="radar-chart" width="320" height="320"></canvas>
          </div>
          <div class="dimensions-detail" id="dimensions-detail"></div>
        </div>

        <div class="result-context-grid">
          <div class="result-context-card result-context-card-tags">
            <div class="context-label">关键词</div>
            <div class="result-tags" id="result-tags"></div>
          </div>
          <div class="result-context-card result-secondary" id="result-secondary" style="display:none">
            <div class="context-label">次选匹配</div>
            <span class="secondary-info" id="secondary-info"></span>
          </div>
        </div>

        <div class="result-section">
          <h3 class="section-title"><span>相近类型 TOP 5</span></h3>
          <div class="top-list" id="top-list"></div>
        </div>

        <div class="disclaimer" id="disclaimer"></div>

        <div class="result-actions">
          <button id="btn-download" class="btn btn-primary">下载分享图</button>
          <button id="btn-restart" class="btn btn-outline">重新测试</button>
          <button id="btn-home" class="btn btn-outline">返回主页</button>
        </div>
      </div>
    </section>
  </div>

</body>
</html>
